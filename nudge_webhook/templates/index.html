<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nudge Microfinance</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/chat.css" />
  </head>
  <body>

    <nav class="nav">
      <div class="nav-left">
        <a href="/" class="nav-back" title="Home">←</a>
        <a href="/" class="nav-brand">Nudge Microfinance</a>
      </div>
      <button class="nav-clear" id="btnClear" type="button">New chat</button>
    </nav>

    <div class="chat-wrap">
      <div class="thread" id="thread" role="log" aria-live="polite"></div>

      <div class="chips" id="chips" aria-label="Quick actions">
        <button class="chip primary" data-send="START" type="button">START</button>
        <button class="chip" data-send="HELP" type="button">HELP</button>
        <button class="chip" data-send="DISTRICTS" type="button">DISTRICTS</button>
        <button class="chip" data-send="Need 5000 for 30 days at 5% monthly" type="button">Example loan</button>
      </div>

      <form class="composer" id="composer" autocomplete="off">
        <input
          id="input"
          type="text"
          placeholder="Type START to begin, or describe a loan…"
          maxlength="500"
          autocomplete="off"
        />
        <button id="send" type="submit">Send</button>
      </form>

      <div class="disclaimer">
        Informational only — not financial or legal advice.
        Data from AIDIS 2019 (Government of India / NSSO). Research: Nihalani (2025) https://papers.ssrn.com/sol3/papers.cfm?abstract_id=6006354
      </div>
    </div>

    <script src="/static/chat.js"></script>
  </body>
</html>
