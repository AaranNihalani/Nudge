<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NudgeAI Web Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/chat.css" />
  </head>
  <body>
    <div class="bg-grain" aria-hidden="true"></div>

    <div class="shell">
      <header class="top">
        <div class="brand">
          <div class="mark" aria-hidden="true"></div>
          <div class="brand-text">
            <div class="brand-title">NudgeAI</div>
            <div class="brand-sub">Web chat console</div>
          </div>
        </div>

        <div class="top-actions">
          <button class="ghost" id="btnClear" type="button">Clear</button>
          <button class="ghost" id="btnCopyDebug" type="button">Copy debug</button>
        </div>
      </header>

      <main class="layout">
        <section class="panel chat" aria-label="Chat">
          <div class="chat-head">
            <div class="chat-head-title">Chat</div>
            <div class="badges" id="badges"></div>
          </div>

          <div class="chips" id="chips" aria-label="Suggested messages">
            <button class="chip" data-send="START" type="button">START</button>
            <button class="chip" data-send="HELP" type="button">HELP</button>
            <button class="chip" data-send="DISTRICTS" type="button">DISTRICTS</button>
            <button class="chip" data-send="MORE" type="button">MORE</button>
            <button
              class="chip chip-accent"
              data-send="Need 5000 for 30 days, interest 5% monthly with moneylender."
              type="button"
            >
              Example loan
            </button>
          </div>

          <div class="thread" id="thread" role="log" aria-live="polite"></div>

          <form class="composer" id="composer" autocomplete="off">
            <input
              id="input"
              name="message"
              type="text"
              placeholder="Type a message… (START → district → loan terms)"
              maxlength="500"
            />
            <button id="send" type="submit">Send</button>
          </form>
        </section>

        <aside class="panel side" aria-label="Context and Debug">
          <div class="side-block">
            <div class="side-title">Context</div>
            <div class="kv" id="contextKv"></div>
          </div>

          <div class="side-block">
            <div class="side-title">Parsed Loan</div>
            <div class="loan" id="loanCard">
              <div class="muted">No loan parsed yet.</div>
            </div>
            <div class="loan-actions" id="loanActions"></div>
          </div>

          <div class="side-block">
            <div class="side-title">Debug</div>
            <pre class="debug" id="debug"></pre>
          </div>
        </aside>
      </main>

      <footer class="foot">
        <div class="muted">
          This is an informational tool. It does not provide legal/financial advice.
        </div>
      </footer>
    </div>

    <script src="/static/chat.js"></script>
  </body>
</html>
