<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nudge — Thailand</title>
    <link rel="icon" href="/static/thailand_favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/chat.css" />
    <style>
      :root {
        --accent: #b45309;
        --bg:  #faf6ee;
        --bg1: #fffcf5;
      }
      /* bubble colours for Thailand amber theme */
      .msg.me .msg-bubble {
        background: rgba(180,83,9,.09);
        border-color: rgba(180,83,9,.18);
      }
      .composer input:focus { border-color: rgba(180,83,9,.4); }
      .composer button { background: var(--accent); }
      .chip:hover  { border-color: var(--accent); background: rgba(180,83,9,.07); }
      .chip.primary { border-color: rgba(180,83,9,.35); color: var(--accent); }

      /* nav overrides */
      .nav-back:hover { color: var(--txt); }
      .nav-brand { color: var(--accent); }
      .nav-clear:hover { background: rgba(180,83,9,.08); }

      /* Country switcher */
      .nav-switcher { display:flex; align-items:center; gap:6px; }
      .switcher-pill {
        font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px;
        text-decoration:none; letter-spacing:.03em; transition:opacity .15s;
      }
      .switcher-pill.active { background:var(--accent); color:#fff; }
      .switcher-pill.inactive {
        background:transparent; color:var(--muted);
        border:1px solid rgba(120,80,20,.18);
      }
      .switcher-pill.inactive:hover { color:var(--txt); border-color:var(--accent); }

      /* Language toggle */
      .lang-toggle {
        display:flex; align-items:center;
        border:1px solid rgba(120,80,20,.22); border-radius:20px; overflow:hidden;
      }
      .lang-btn {
        font-size:11px; font-weight:600; letter-spacing:.03em;
        padding:4px 11px; border:none; cursor:pointer;
        background:transparent; color:var(--muted);
        transition:background .15s, color .15s; line-height:1.2;
      }
      .lang-btn.active { background:var(--accent); color:#fff; }
      .lang-btn:not(.active):hover { background:rgba(180,83,9,.07); color:var(--txt); }
      .lang-sep { width:1px; background:rgba(120,80,20,.22); height:16px; align-self:center; }
    </style>
  </head>
  <body>

    <nav class="nav">
      <div class="nav-left">
        <a href="/thailand" class="nav-back" title="Thailand home">←</a>
        <a href="/thailand" class="nav-brand">Nudge — Thailand</a>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="nav-switcher">
          <a href="/chat"          class="switcher-pill inactive">🇮🇳 India</a>
          <a href="/thailand/chat" class="switcher-pill active">🇹🇭 Thailand</a>
        </div>
        <div class="lang-toggle" id="langToggle" title="Response language">
          <button class="lang-btn active" data-lang="en" type="button">EN</button>
          <div class="lang-sep"></div>
          <button class="lang-btn"        data-lang="th" type="button">ภาษาไทย</button>
        </div>
      </div>
      <button class="nav-clear" id="btnClear" type="button">New chat</button>
    </nav>

    <div class="chat-wrap">
      <div class="thread" id="thread" role="log" aria-live="polite"></div>

      <div class="chips" id="chips" aria-label="Quick actions">
        <button class="chip" data-send="help"          type="button">How it works</button>
        <button class="chip" data-send="show provinces" type="button">Browse provinces</button>
        <button class="chip" data-send="I'm in Bangkok" type="button">Bangkok</button>
        <button class="chip" data-send="Need ฿10,000 for 60 days at 15% monthly" type="button">Example loan</button>
      </div>

      <form class="composer" id="composer" autocomplete="off">
        <input
          id="input"
          type="text"
          placeholder="Enter your province or describe a loan offer in ฿…"
          maxlength="500"
          autocomplete="off"
        />
        <button id="btnSend" type="submit">Send</button>
      </form>

      <div class="disclaimer">
        Informational only — not financial or legal advice.
        Rates sourced from BOT / FPO / published research. Verify with lender before applying.
        Fieldwork planned August 2026 with Duang Prateep Foundation, Klong Toey, Bangkok.
      </div>
    </div>

    <script>
    (function () {
      const API      = "/api/thailand/chat";
      const SID_KEY  = "nudge_thailand_sid";
      const TX_KEY   = "nudge_thailand_tx";
      const LANG_KEY = "nudge_thailand_lang";

      // ── Helpers ─────────────────────────────────────────────────────────────
      function esc(s) {
        return String(s || "")
          .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
      }

      function mdLite(text) {
        let s = esc(String(text || "").replace(/\r\n/g,"\n"));
        s = s.replace(/(^|\n)\s*---\s*(?=\n|$)/g,'$1<hr class="md-hr">');
        s = s.replace(/`([^`\n]+)`/g,"<code>$1</code>");
        s = s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
        s = s.replace(/\*([^*\n]+)\*/g,"<em>$1</em>");
        s = s.replace(/(https?:\/\/[^\s<"']+[^\s<"'.,;:!?])/g,
            '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
        s = s.split("\n").map(l => {
          const m = /^(\s*)-\s+(.+)$/.exec(l);
          return m ? `${m[1]}• ${m[2]}` : l;
        }).join("\n");
        return s.replace(/\n/g,"<br>");
      }

      // ── Session ──────────────────────────────────────────────────────────────
      function getSid() {
        let s = localStorage.getItem(SID_KEY);
        if (s && s.length > 8) return s;
        s = (globalThis.crypto?.randomUUID?.()) || `sid_${Math.random().toString(16).slice(2)}_${Date.now()}`;
        localStorage.setItem(SID_KEY, s);
        return s;
      }
      const sid = getSid();

      // ── Transcript ───────────────────────────────────────────────────────────
      function loadTx() {
        try { const r = JSON.parse(localStorage.getItem(TX_KEY)); return Array.isArray(r) ? r.slice(-200) : []; }
        catch { return []; }
      }
      function saveTx(tx) {
        try { localStorage.setItem(TX_KEY, JSON.stringify(tx.slice(-200))); } catch {}
      }
      let tx = loadTx();

      // ── Language ─────────────────────────────────────────────────────────────
      let lang = localStorage.getItem(LANG_KEY) || "en";

      const WELCOME = {
        en: "สวัสดี! I'm **Nudge** — a tool for understanding loan costs in Thailand.\n\nStart by telling me your **province** (e.g. Bangkok, Chiang Mai, Khon Kaen), then describe the loan offer you've been given. I'll show you the total repayment in ฿ and compare it with regulated Pico Finance, Nano Finance, BAAC, and Village Fund alternatives.",
        th: "สวัสดีครับ! ผมชื่อ **Nudge** — เครื่องมือช่วยประเมินต้นทุนเงินกู้ในประเทศไทย\n\nเริ่มต้นด้วยการบอก**จังหวัด**ของคุณ (เช่น กรุงเทพฯ เชียงใหม่ ขอนแก่น) จากนั้นเล่าให้ฟังว่าได้รับข้อเสนอเงินกู้อย่างไร ผมจะคำนวณยอดชำระรวมเป็น ฿ และเปรียบเทียบกับทางเลือกที่มีการควบคุม เช่น พิโกไฟแนนซ์ นาโนไฟแนนซ์ ธ.ก.ส. และกองทุนหมู่บ้านครับ",
      };

      function applyLang(l, reWelcome) {
        lang = l;
        localStorage.setItem(LANG_KEY, l);
        document.querySelectorAll(".lang-btn").forEach(b => {
          b.classList.toggle("active", b.dataset.lang === l);
        });
        // If no conversation yet, replace the welcome message
        if (reWelcome && tx.length === 0) {
          document.getElementById("thread").innerHTML = "";
          addMsg("bot", WELCOME[lang] || WELCOME.en, false);
        }
      }

      document.getElementById("langToggle").addEventListener("click", e => {
        const b = e.target.closest(".lang-btn");
        if (b && b.dataset.lang !== lang) applyLang(b.dataset.lang, true);
      });

      // ── DOM refs ─────────────────────────────────────────────────────────────
      const thread  = document.getElementById("thread");
      const chips   = document.getElementById("chips");
      const input   = document.getElementById("input");
      const composer= document.getElementById("composer");
      const btnSend = document.getElementById("btnSend");

      // ── Message rendering ────────────────────────────────────────────────────
      function addMsg(role, text, save = true) {
        const isMe = role === "user";
        const wrap = document.createElement("div");
        wrap.className = `msg ${isMe ? "me" : "bot"}`;
        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        bubble.innerHTML = mdLite(text);
        wrap.appendChild(bubble);
        thread.appendChild(wrap);
        thread.scrollTop = thread.scrollHeight;
        if (save) {
          tx.push({ role, text });
          saveTx(tx);
        }
        return wrap;
      }

      function showTyping() {
        const wrap = document.createElement("div");
        wrap.className = "msg bot pending";
        wrap.id = "typing-wrap";
        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        const dots = document.createElement("div");
        dots.className = "typing-dots";
        dots.innerHTML = "<span></span><span></span><span></span>";
        bubble.appendChild(dots);
        wrap.appendChild(bubble);
        thread.appendChild(wrap);
        thread.scrollTop = thread.scrollHeight;
        return wrap;
      }

      function removeTyping() {
        document.getElementById("typing-wrap")?.remove();
      }

      function setChips(actions) {
        chips.innerHTML = "";
        (actions || []).forEach(a => {
          const b = document.createElement("button");
          b.className = "chip";
          b.type = "button";
          b.textContent = a.label;
          b.dataset.send = a.send;
          chips.appendChild(b);
        });
      }

      // ── Send ─────────────────────────────────────────────────────────────────
      let sending = false;

      async function send(text) {
        text = (text || "").trim();
        if (!text || sending) return;
        sending = true;
        btnSend.disabled = true;
        addMsg("user", text);
        input.value = "";
        const typing = showTyping();

        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sid, message: text, lang }),
          });
          removeTyping();
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          addMsg("bot", data.reply || "Sorry, something went wrong.");
          setChips(data.actions || []);
        } catch (err) {
          removeTyping();
          addMsg("bot", "Sorry — something went wrong. Please try again.");
          console.error(err);
        } finally {
          sending = false;
          btnSend.disabled = false;
          input.focus();
        }
      }

      composer.addEventListener("submit", e => { e.preventDefault(); send(input.value); });
      chips.addEventListener("click", e => {
        const b = e.target.closest("[data-send]");
        if (b) send(b.dataset.send);
      });
      document.getElementById("btnClear").addEventListener("click", () => {
        tx = []; saveTx([]);
        localStorage.removeItem(SID_KEY);
        thread.innerHTML = "";
        chips.innerHTML = "";
        applyLang(lang, true);
      });

      // ── Init ─────────────────────────────────────────────────────────────────
      applyLang(lang, false);

      if (tx.length) {
        tx.forEach(m => addMsg(m.role, m.text, false));
      } else {
        addMsg("bot", WELCOME[lang] || WELCOME.en, false);
        setChips([
          { label: "Bangkok",      send: "I'm in Bangkok" },
          { label: "Chiang Mai",   send: "I'm in Chiang Mai" },
          { label: "Khon Kaen",    send: "I'm in Khon Kaen" },
          { label: "Example loan", send: "Need ฿10,000 for 60 days at 15% monthly" },
        ]);
      }
    })();
    </script>
  </body>
</html>
