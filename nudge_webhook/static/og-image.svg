<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07090c"/>
      <stop offset="100%" stop-color="#0c1520"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle teal glow top-right -->
  <ellipse cx="950" cy="160" rx="400" ry="260" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="3" height="470" fill="#2dd4bf" opacity="0.5" rx="2"/>

  <!-- Wordmark -->
  <text x="108" y="168" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" fill="#ffffff" opacity="0.92" letter-spacing="-3">Nudge</text>

  <!-- Subtitle -->
  <text x="110" y="218" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="400" fill="#2dd4bf" letter-spacing="0.5">Microfinance</text>

  <!-- Divider -->
  <rect x="110" y="248" width="520" height="1" fill="#ffffff" opacity="0.1"/>

  <!-- Description -->
  <text x="110" y="295" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#ffffff" opacity="0.55">AI-powered financial guidance for Indian households</text>
  <text x="110" y="328" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#ffffff" opacity="0.55">Based on 480,000 nationally representative loan records.</text>

  <!-- Stats grid — 3 cards -->
  <!-- Card 1 -->
  <rect x="110" y="388" width="290" height="120" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="134" y="434" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#f87171">50.2%</text>
  <text x="134" y="460" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.5">of Indian loans are informal</text>
  <text x="134" y="478" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.3">AIDIS 2019</text>

  <!-- Card 2 -->
  <rect x="420" y="388" width="290" height="120" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="444" y="434" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#f87171">18.65%</text>
  <text x="444" y="460" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.5">mean informal interest rate</text>
  <text x="444" y="478" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.3">vs 10.52% formal — AIDIS 2019</text>

  <!-- Card 3 -->
  <rect x="730" y="388" width="290" height="120" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#2dd4bf" stroke-opacity="0.25" stroke-width="1"/>
  <text x="754" y="434" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#2dd4bf">Try it</text>
  <text x="754" y="460" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.5">Describe your loan in plain</text>
  <text x="754" y="478" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.5">English. Get alternatives.</text>

  <!-- Bottom citation -->
  <text x="110" y="558" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.25">Nihalani, A. (2025). Understanding Financial Inclusion. SSRN 6006354.</text>

  <!-- Border frame -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#2dd4bf" stroke-opacity="0.12" stroke-width="2"/>
</svg>
